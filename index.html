<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AuditFlow</title>

  <!-- MSAL pour l'authentification Azure AD -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

  <!-- Styles principaux -->
  <link rel="stylesheet" href="css/app.css"/>

  <!-- Configuration (à remplir avec les infos de votre IT) -->
  <script src="config.js"></script>
</head>
<body>

<!-- ÉCRAN DE CONNEXION -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-dot"></div>
      <span>AuditFlow</span>
    </div>
    <div class="login-title">Bienvenue</div>
    <div class="login-sub">Connectez-vous avec votre compte Microsoft</div>
    <button class="login-btn" id="login-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="0" y="0" width="8" height="8" fill="#F25022"/>
        <rect x="10" y="0" width="8" height="8" fill="#7FBA00"/>
        <rect x="0" y="10" width="8" height="8" fill="#00A4EF"/>
        <rect x="10" y="10" width="8" height="8" fill="#FFB900"/>
      </svg>
      Se connecter avec Microsoft
    </button>
    <div class="login-version">AuditFlow v1.0 · Groupe</div>
  </div>
</div>

<!-- APPLICATION PRINCIPALE -->
<div id="app" class="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-dot"></div>
      AuditFlow
    </div>

    <div class="nav-section">Référentiels</div>
    <div class="nav" data-view="plan-process" id="nav-plan-process">
      <span class="ni">◈</span>Plan Process
    </div>
    <div class="nav" data-view="plan-bu" id="nav-plan-bu">
      <span class="ni">◉</span>Plan BU
    </div>
    <div class="nav" data-view="historique" id="nav-historique">
      <span class="ni">◷</span>Historique
    </div>

    <div class="nav-section">Audit Flow</div>
    <div class="nav active" data-view="dashboard" id="nav-dashboard">
      <span class="ni">◻</span>Tableau de bord
    </div>
    <div class="nav" data-view="mes-audits" id="nav-mes-audits">
      <span class="ni">≡</span>Mes audits
    </div>
    <div class="nav" data-view="planification" id="nav-planification">
      <span class="ni">▦</span>Planification 2025
    </div>
    <div class="nav" data-view="modeles" id="nav-modeles">
      <span class="ni">▤</span>Modèles
    </div>

    <div class="nav-section">Suivi</div>
    <div class="nav" data-view="plans-action" id="nav-plans-action">
      <span class="ni">✦</span>Plans d'action
    </div>

    <div class="nav-section admin-only">Administration</div>
    <div class="nav admin-only" data-view="roles" id="nav-roles">
      <span class="ni">⊙</span>Rôles & Accès
    </div>

    <div class="sidebar-footer">
      <div class="user-chip" id="user-chip">
        <div class="user-av" id="user-av">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Se déconnecter">↗</button>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="main" id="main-content">

    <!-- Les vues sont injectées dynamiquement par app.js -->
    <div id="view-container"></div>

  </div>

</div>

<!-- TOAST NOTIFICATIONS -->
<div class="toast" id="toast"></div>

<!-- MODAL GÉNÉRIQUE -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Annuler</button>
      <button class="btn-primary" id="modal-confirm">Confirmer</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/auth.js"></script>
<script src="js/sharepoint.js"></script>
<script src="js/data.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>

</body>
</html>
